<div class="dashboard-container" [appTheme]="currentTheme">

  <header class="main-header">
    <h1> Dashboard</h1>

    <button class="theme-toggle" (click)="toggleTheme()">
      {{ currentTheme === 'light' ? 'Dark' : 'Light' }} Mode
    </button>
  </header>

  <div class="total-banner">
    <h2>Total Cart Price: <span class="price-text">{{ totalPrice }}$</span></h2>
  </div>

  <div class="filter-controls">
    <div class="control-group">
      <label>Category Filter:</label>
      <select #catSelect (change)="onFilterChange(catSelect.value)">
        <option value="all">All Categories</option>
        <option value="smartphones">Smartphones</option>
        <option value="laptops">Laptops</option>
      </select>
    </div>

    <div class="control-group">
      <label>Sort Options:</label>
      <select #sortSelect (change)="onSortChange(sortSelect.value)">
        <option value="none">Default</option>
        <option value="low-price">Lowest Price First</option>
        <option value="high-stock">Highest Stock Quantity</option>
      </select>
    </div>
  </div>

  <div class="products-grid">
    <app-product-card
      *ngFor="let prod of filteredProducts"
      [product]="prod"
      (quantityChanged)="calculateTotal()"
      (productPurchased)="handlePurchase($event)">
    </app-product-card>
  </div>

</div>
